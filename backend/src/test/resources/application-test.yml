# 测试环境配置（04-开发与质量保证 - 测试用）
# 使用 H2 内存数据库，无需 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB

app:
  jwt:
    secret: TestJwtSecretKeyForUnitTestAtLeast256BitsLong!!!!!!!!!!!!!!!!!!!!!!!!!!!
    expiration: 86400000
  ml:
    service:
      url: http://localhost:5000
      timeout: 1000
  ai:
    enabled: false
  upload:
    path: ./target/test-uploads

logging:
  level:
    root: WARN
    com.rental: INFO
